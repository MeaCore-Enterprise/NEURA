name: CI
on:
  push:
  pull_request:
jobs:
  core-checks:
    runs-on: ubuntu-latest
    env:
      NEURA_DIST_DIR: dist
      NEURA_APP_NAME: neura
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Compute npm cache dir
        run: echo "NPM_CACHE_DIR=$(npm config get cache)" >> $GITHUB_ENV
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ${{ env.NPM_CACHE_DIR }}
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install Node deps
        run: npm ci
      - name: Build core
        run: npm run build
      - name: Typecheck core
        run: npm run typecheck
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Compute cargo home
        run: echo "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" >> $GITHUB_ENV
      - name: Cache cargo registry+git
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Cache Rust build targets (CI only)
        uses: actions/cache@v4
        with:
          path: |
            tauri-plugin-neura-audio/target
            src-tauri/target
          key: target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            target-${{ runner.os }}-
      - name: Cargo check plugin
        run: cargo check --manifest-path tauri-plugin-neura-audio/Cargo.toml
      - name: Cargo check app
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Verify plugin script
        run: bash scripts/verify-plugin.sh
