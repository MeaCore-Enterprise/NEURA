name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Build core TypeScript
        run: npm run build

      - name: Build UI
        run: npm run ui:build

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            tauri-plugin-neura-audio/target
            src-tauri/target
          key: target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            target-${{ runner.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'NEURA Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## NEURA Desktop ${{ github.ref_name }}

            Descarga el instalador para tu sistema operativo:

            | Sistema | Archivo |
            |---------|---------|
            | Windows | `.msi` o `.exe` |
            | macOS   | `.dmg` |
            | Linux   | `.AppImage` o `.deb` |

            > Los binarios son compilados automáticamente desde el código fuente.
          releaseDraft: false
          prerelease: false
          args: --ci

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neura-${{ matrix.label }}-${{ github.ref_name }}
          path: |
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30
